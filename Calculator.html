<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body{
      background-color: black;
    text-align: center;

    }
    button{
      width: 60px;
      height: 60px;
      font-size: 30px;
      margin: 3px;
      border:none;
      background-color:rgb(52,52,52);
      color: white;
      border-radius: 50%;

    }

    .clear{
      border-radius: 30px;
      width: 200px;
    }
    .operator{
      background-color: darkorange;
      color: white;
    }
  </style>
</head>
<body>
  <p>
  <button onclick="
  updateCalculation('1');
   ">1</button>
   
   <button onclick="
   updateCalculation('2');
   "
   >2</button>
    
    <button onclick="
   updateCalculation('3');
   "
   >3</button>
    
    <button class="operator" onclick="
  updateCalculation('+');"
   >+</button>
     </p>
    
      <p>
        <button onclick="
   updateCalculation('4');"
   >4</button>
  
  <button onclick="
   updateCalculation('5');
   ">5</button>
   
   <button onclick="
   updateCalculation('6');
   ">6</button>
    
    <button class="operator" onclick="
   updateCalculation('-');
   ">-</button>
      </p>
      
      <p>
        <button onclick="
   updateCalculation('7');
   ">7</button>
      
      <button onclick="
  updateCalculation('8');
   "   >8</button>
        
        <button onclick="
   updateCalculation('9');
   ">9</button>
       
       <button class="operator" onclick="
   updateCalculation('*');
   ">*</button>
      </p>
      
      <p>
        <button onclick="
   updateCalculation('0')
   ">0</button>
      
      <button onclick="
  updateCalculation('.');
   ">.</button>

<button onclick="
        calculation = eval(calculation);
        console.log(calculation);
        ">=</button>
      
      <button class="operator" onclick="
   updateCalculation('/');
   ">/</button>
      </p>
      
      <button class="clear" onclick="
     updateCalculation(); 
   ">Clear</button>
        
  <script>
    let calculation =localStorage.getItem('calculation')|| '';

    function updateCalculation(number){
  calculation += number;
console.log(calculation); 
localStorage.setItem('calculation',calculation);
    }
    
  </script> 
</body>
</html>
