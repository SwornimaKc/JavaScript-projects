<!DOCTYPE html>
<html lang="en">
<head>
  <style>
     body {
      background-color: #121212;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding-top: 50px;
    }

    .topic {
      color: #ffcc00;
      text-shadow: 2px 2px #000;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .click {
      width: 100px;
      height: 100px;
      font-size: 60px;
      border-radius: 50%;
      background-color: #00bcd4;
      border: none;
      margin: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .click:hover {
      background-color: #00e6e6;
      transform: scale(1.15);
      box-shadow: 0 0 15px #00e6e6;
    }

    .click:active {
      transform: scale(0.95);
    }

    .result {
      font-size: 1.3rem;
      margin-top: 20px;
      animation: fadeIn 0.5s ease;
    }

    .message {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 10px;
      animation: popIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .score {
      margin-top: 30px;
      font-size: 1.2rem;
      color: orangered;
    }

    .reset {
      margin-top: 20px;
      background-color: yellowgreen;
      color: #fff;
      font-size: 1.1rem;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .reset:hover {
      background-color: #8bc34a;
      transform: scale(1.05);
    }
    </style>
  <title>Scissor Paper Rock</title>
</head>
<body>

  <h1 class="topic">Rock Paper Scissor</h1>

 
    <button class="click" onclick="playGame('rock')"> 
       ✊🏼

    </button>
    <button class="click" onclick="playGame('paper')"> 
           🖐🏼

    </button>
        
    <button class="click" onclick="playGame('scissors')"> 
           ✌🏼

    </button>

     <div class="result" id = 'result'>
        
  </div>
  <div id = "message"></div>

  <div class=" score" id="score">
    Wins:0,
Losses: 0,
Ties:0  </div>
  <br>

  <button class="reset" onclick="resetScore()"> Reset Score</button>

  <script>
    let score= {
    wins: 0,
    losses:0,
    ties:0
    };

    const emojiMap = {
      rock:"✊🏼",
      paper:"🖐🏼",
      scissors:" ✌🏼"
    };
      function playGame(playerMove){
        const randomNumber = Math.random();
        let computerMove = '';

        if(randomNumber <1/3 ){
          computerMove='rock';
        }
        else if(randomNumber>= 1/3 && randomNumber<2/3){
          computerMove ='paper';
        }
        else if(randomNumber >=2/3 && randomNumber< 1){
          computerMove='scissors';
                  }

        let result = '';

        if(playerMove === computerMove){
          result= "It's a Tie!";
          score.ties++;
        }
        else if(
          (playerMove === 'rock' && computerMove === 'scissors') ||
          (playerMove === 'paper' && computerMove === 'rock') ||
          (playerMove === 'scissors' && computerMove ==='paper')
        ){
          result ="you win!";
          score.wins++;
        }
        else{
          result= "you lose.";
          score.losses++;
        }

        // display result on page
        document.getElementById('result').innerHTML= `
        <div>

        <div>You: <b>
        ${emojiMap[playerMove]}</b></div> 
        </div>
        <div>
          <div> Computer: ${emojiMap[computerMove]}</div>
          </div> `;

          document.getElementById("message").textContent=result;

        //update score display
        document.getElementById('score').textContent=`Wins:${score.wins},
          losses: ${score.losses},
          Ties: ${score.ties}`;
        
      }
          function resetScore() {
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;

      document.getElementById('score').textContent =
        'Wins: 0, Losses: 0, Ties: 0';

      document.getElementById('result').innerHTML = '';
            
      document.getElementById("message").innerHTML="";
    }

  </script>


  
</body>
</html>
